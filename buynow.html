    <div>
  <div class="container">
    <h2>Place Your Order</h2>
    <form id="orderForm">
        <input type="text" id="username" name="name" placeholder="Enter your name">
        <p id="erroru"></p>
       
        <input type="tel" id="mobile" name="phone" placeholder="Enter Mobile number">
        <p id="errormobile"></p>

        <textarea id="address" name="address" rows="4" placeholder="Enter your Address" required></textarea>

        
        <select id="payment" name="payment" required>
            <option value="" id="paymentoption" disabled selected>Choose your Payment Option here</option>
            <option value="cod">Cash on Delivery</option>
            <option value="online">Pay Online</option>
        </select>
        <p id="totalprice"></p>

        <button type="submit" id="submitBtn">Submit Order</button>
        <!-- <button type="button" id="payOnlineBtn" class="hidden">Proceed to Payment</button> -->
    </form>
